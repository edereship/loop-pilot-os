# LoopPilot OS E2E 検証用設定 (ES-437)

[product]
spec_dir = "docs/specs"

[repo]
path = "/opt/ai-runner/repos/loop-pilot-os-e2e"
remote = "racoma-dev/loop-pilot-os-e2e"
default_branch = "main"

[linear]
team = "ES"
project = "LoopPilot OS E2E"
opt_in_label = "ai-ok"
needs_human_label = "needs-human"
[linear.states]
todo = "Todo"
in_progress = "In Progress"
in_review = "In Review"
done = "Done"

[agent]
model = "claude-opus-4-8[1m]"
effort = "xhigh"
allowed_tools = "Edit,Write,Read,Glob,Grep,Bash"
# ⚠ E2Eテスト専用: 隔離された ai-runner 上でのみ使用。本番は acceptEdits を使うこと。
permission_mode = "bypassPermissions"

# フェーズ別オーバーライド（example.toml の出荷既定と同一のコスパ配分）
[agent.design]
model = "claude-opus-4-8"
effort = "high"
[agent.self_review]
model = "claude-sonnet-4-6"
effort = "high"
[agent.recovery]
model = "claude-opus-4-8"
effort = "high"
[agent.verify]
model = "claude-sonnet-4-6"
effort = "medium"

[handoff]
branch_prefix = "looppilot"
pr_body_template = """
Implements {identifier}: {title}

{issue_url}

🤖 Generated by LoopPilot OS
"""

[looppilot]
gate_label = "loop-pilot"
state_comment_authors = ["github-actions[bot]"]

[safety]
max_tasks_per_run = 3
max_cost_usd_per_session = 10.0
not_engaged_guard_minutes = 30
session_hard_timeout_minutes = 120
codex_timeout_minutes = 30
select_diff_budget_chars = 6000
max_verify_attempts = 2
max_cost_usd_per_verify = 2
verify_timeout_minutes = 15
max_recovery_attempts = 2
transient_retry_attempts = 2

[loop]
monitor_poll_seconds = 60
idle_recheck_seconds = 300

[digest]
recent_merged_count = 5

[groom]
enabled = false

[self_review]
enabled = true

[verify]
enabled = true

[memory]
max_chars_per_file = 8000
inject_budget_chars = 6000
