[product]
goal = "プロダクトのゴールと制約（spec_dir を使う場合はコメントアウト）"
# spec_dir = "docs/specs"   # repo 内の仕様ディレクトリ。requirements.md（必須）+ 領域別要件定義を注入
#                            # 使用条件: <spec_dir>/requirements.md が存在し空でないこと。
#                            # 設定した場合は goal を削除またはコメントアウトすること。

[repo]
path = "/abs/path/to/target-repo"
remote = "owner/name"
default_branch = "main"
# worktree_root 省略時: ~/.looppilot-os/worktrees/<repoのdir名>

[linear]
# APIキーは環境変数 LINEAR_API_KEY（ファイルに書かない）
team = "YOUR_TEAM"              # team key（あなたの Linear team key に置換）
project = "Your Project"        # project 名（プリフライトで ID 解決・検証）に置換
opt_in_label = "ai-ok"          # オプトインラベル名
needs_human_label = "needs-human" # abandon 時に付与するトリアージ用ラベル名（SELECT 除外）
[linear.states]                 # 状態名 → プリフライトで ID 解決
todo = "Todo"
in_progress = "In Progress"
in_review = "In Review"
done = "Done"

[agent]
model = "claude-opus-4-8[1m]"  # claude --model に渡す（出荷既定: Opus 4.8 1M コンテキスト）
effort = "xhigh"               # claude --effort に渡す（出荷既定: xhigh）
                               #   xhigh: Opus 4.7+ / Fable 5 専用。コーディング/エージェント用途の最適点
                               #          （max は overthinking と収穫逓減が出やすくコストも嵩む）
                               #   max:   Opus 4.6+ / Sonnet 4.6 で有効
                               #   Haiku 4.5 / Sonnet 4.5 は effort 非対応
                               #   auto:  モデル既定にリセット（effort 非対応モデル向けの逃げ道）
                               #   effort↑ は max_cost_usd_per_session を早く消費しレートリミットも食う
allowed_tools = "Edit,Write,Read,Glob,Grep,Bash"   # --allowedTools
# permission_mode = "acceptEdits"  # claude --permission-mode に渡す（既定: acceptEdits）
                                   #   acceptEdits: dev機/共有環境向け（既定・安全）
                                   #   bypassPermissions: 使い捨て隔離コンテナ/VM 専用
                                   #     ⚠ 補償条件必須: 資格情報分離 + egress 制限 + 非 root 実行
                                   #   その他: default / plan / auto / dontAsk
# extra_args = []               # 任意の追加 claude フラグ（既定なし）

# ---- フェーズ別 agent オーバーライド（ES-486）----
# 未設定のフェーズは [agent] の model/effort をそのまま使う（implement は [agent] を継承）。
# コスパ方針: implement は Opus xhigh（品質が全工程に効く）、design/recovery は Opus high、
# 毎チケット必ず走る短時間セッション（self_review/verify）は Sonnet に落として
# API 従量コストとサブスク 5 時間ウィンドウの消費を抑える（Opus は Sonnet の約5倍消費）。
# 1M コンテキスト（[1m]）が必要なのは大きなコードベースを読む implement のみ。
[agent.design]
model = "claude-opus-4-8"      # plan mode の設計書生成。知能感度は高いがスコープ小
effort = "high"
[agent.self_review]
model = "claude-sonnet-4-6"    # 自分の差分レビュー（15分・$2キャップ）。判定タスクは Sonnet で十分
effort = "high"
[agent.recovery]
model = "claude-opus-4-8"      # CI/ワークフロー失敗の修復。デバッグ難度が高いことがある
effort = "high"
[agent.verify]
model = "claude-sonnet-4-6"    # テスト実行と結果判定が主。誤判定は max_verify_attempts でリトライ可
effort = "medium"

# ---- Codex (PM) 設定（ES-486）----
# [pm]
# model = "gpt-5.5"           # codex exec -m に渡す（既定: gpt-5.5）
# [pm.effort]
# groom = "medium"            # GROOM フェーズの reasoning effort（既定: medium）
# select = "low"              # SELECT フェーズの reasoning effort（既定: low）
# design_review = "high"      # DESIGN REVIEW フェーズの reasoning effort（既定: high）
# recovery = "high"            # Codex 回復ターンの reasoning effort（既定: high）
# verify = "high"              # VERIFY 合否判定（Codex）の reasoning effort（既定: high）

[handoff]
branch_prefix = "looppilot"
pr_body_template = """
Implements {identifier}: {title}

{issue_url}

🤖 Generated by LoopPilot OS
"""

[looppilot]
gate_label = "loop-pilot"                       # 対象リポの LOOPPILOT_LABEL に一致させる
state_comment_authors = ["github-actions[bot]"] # 信頼著者

[safety]
max_tasks_per_run = 3
max_cost_usd_per_session = 10.0
# monitor_timeout_minutes = 60   # 任意。既定60分。長時間 in_progress レビューを強制停止するタイムアウト
not_engaged_guard_minutes = 30   # 常時オン
session_hard_timeout_minutes = 120  # 任意。既定120。hung（無進捗・無支出）claude を切る hard backstop
# select_diff_budget_chars = 6000  # PM選別ターンに渡す直前PRの full diff 予算（文字数）。超過時は per-file head で機械 truncate
# select_codebase_summary_budget_chars = 5000  # PM選別ターンに渡すコードベースサマリ予算（文字数）。大規模リポではトランケーション
# groom_timeout_minutes = 10     # GROOM フェーズの Codex タイムアウト（既定10分）
# groom_board_budget_chars = 10000  # GROOM に渡すチケット盤面の文字数予算（既定10000）
# max_verify_attempts = 2         # VERIFY 不合格→再実装の上限（既定2）
# max_cost_usd_per_verify = 2     # VERIFY（Claude 実行）セッションのコスト上限（既定$2）
# verify_timeout_minutes = 15     # VERIFY セッションのタイムアウト（既定15分）
# max_recovery_attempts = 2       # ci_failed/merge_conflict の自動修正上限（尽きたら abandon、既定2）
# transient_retry_attempts = 2    # ネットワーク瞬断の操作リトライ回数（計3試行・0で無効、既定2）
# merge_gate_timeout_minutes = 15       # マージゲート Codex 判定のタイムアウト（既定15分。Codexはコスト計測不能のためtimeoutのみ）
# max_merge_gate_fix_attempts = 2       # ゲート fail 時の自動修正上限（尽きたら park、既定2）
# max_cost_usd_per_merge_gate_fix = 2   # ゲート修正ターン（Claude）のコスト上限（既定$2）

[loop]
monitor_poll_seconds = 60
idle_recheck_seconds = 300
# idle_timeout_minutes = 120  # 適格チケット不在でのアイドル時間上限（既定120分）。0 = 無効

[digest]
recent_merged_count = 5
# enabled = true           # false にすると digest セクションを丸ごと省略（効果測定後に廃止可能）

[notify]
# Slack Webhook は環境変数 SLACK_WEBHOOK_URL（未設定ならコンソールのみ）
# progress = false              # true にすると各チケットの着手/完了を Slack にも通知（既定 false）

[groom]
# enabled = true                # false にすると GROOM フェーズをスキップ（既定 true）

[merge_gate]
# enabled = true                # false にするとマージ直前の破壊的変更ゲートをスキップ（既定 true）

[memory]
# max_chars_per_file = 8000     # 横断メモリ 1 ファイルあたりの最大文字数（既定 8000）
# inject_budget_chars = 6000    # GROOM/SELECT/PLAN プロンプトへのメモリ注入文字数予算（既定 6000）

[verify]
# enabled = true               # VERIFY ゲートの有効/無効（既定 true）
# run_recipe = ""              # C3: アプリ起動/受け入れテストコマンド。未設定なら C1 軽量モードに縮退
