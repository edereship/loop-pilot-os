[product]
goal = "プロダクトのゴールと制約（spec_dir を使う場合はコメントアウト）"
# spec_dir = "docs/specs"   # repo 内の仕様ディレクトリ。requirements.md（必須）+ 領域別要件定義を注入
#                            # 使用条件: <spec_dir>/requirements.md が存在し空でないこと。
#                            # 設定した場合は goal を削除またはコメントアウトすること。

[repo]
path = "/abs/path/to/target-repo"
remote = "owner/name"
default_branch = "main"
# worktree_root 省略時: ~/.looppilot-os/worktrees/<repoのdir名>

[linear]
# APIキーは環境変数 LINEAR_API_KEY（ファイルに書かない）
team = "TY"                     # team key
project = "LoopPilot OS"        # project 名（プリフライトで ID 解決・検証）
opt_in_label = "ai-ok"          # オプトインラベル名
[linear.states]                 # 状態名 → プリフライトで ID 解決
todo = "Todo"
in_progress = "In Progress"
in_review = "In Review"
done = "Done"

[agent]
model = "claude-opus-4-6[1m]"  # claude --model に渡す（出荷既定: Opus 4.6 1M コンテキスト）
effort = "max"                 # claude --effort に渡す（出荷既定: max）
                               #   max:   Opus 4.6+ / Sonnet 4.6 で有効
                               #   xhigh: Opus 4.7+ / Fable 5 専用
                               #   Haiku 4.5 / Sonnet 4.5 は effort 非対応
                               #   effort↑ は max_cost_usd_per_session を早く消費しレートリミットも食う
allowed_tools = "Edit,Write,Read,Glob,Grep,Bash"   # --allowedTools
# permission_mode = "acceptEdits"  # claude --permission-mode に渡す（既定: acceptEdits）
                                   #   acceptEdits: dev機/共有環境向け（既定・安全）
                                   #   bypassPermissions: 使い捨て隔離コンテナ/VM 専用
                                   #     ⚠ 補償条件必須: 資格情報分離 + egress 制限 + 非 root 実行
                                   #   その他: default / plan / auto / dontAsk
# extra_args = []               # 任意の追加 claude フラグ（既定なし）

[handoff]
branch_prefix = "looppilot"
pr_body_template = """
Implements {identifier}: {title}

{issue_url}

🤖 Generated by LoopPilot OS
"""

[looppilot]
gate_label = "loop-pilot"                       # 対象リポの LOOPPILOT_LABEL に一致させる
state_comment_authors = ["github-actions[bot]"] # 信頼著者

[safety]
max_tasks_per_run = 3
max_cost_usd_per_session = 10.0
# monitor_timeout_minutes = 60   # 任意。既定60分。長時間 in_progress レビューを強制停止するタイムアウト
not_engaged_guard_minutes = 30   # 常時オン
session_hard_timeout_minutes = 120  # 任意。既定120。hung（無進捗・無支出）claude を切る hard backstop
# select_diff_budget_chars = 6000  # PM選別ターンに渡す直前PRの full diff 予算（文字数）。超過時は per-file head で機械 truncate
# select_codebase_summary_budget_chars = 5000  # PM選別ターンに渡すコードベースサマリ予算（文字数）。大規模リポではトランケーション
# groom_timeout_minutes = 10     # GROOM フェーズの Codex タイムアウト（既定10分）
# groom_board_budget_chars = 10000  # GROOM に渡すチケット盤面の文字数予算（既定10000）

[loop]
monitor_poll_seconds = 60
idle_recheck_seconds = 300

[digest]
recent_merged_count = 5
# enabled = true           # false にすると digest セクションを丸ごと省略（効果測定後に廃止可能）

[notify]
# Slack Webhook は環境変数 SLACK_WEBHOOK_URL（未設定ならコンソールのみ）
# progress = false              # true にすると各チケットの着手/完了を Slack にも通知（既定 false）

[groom]
# enabled = true                # false にすると GROOM フェーズをスキップ（既定 true）

[memory]
# max_chars_per_file = 8000     # 横断メモリ 1 ファイルあたりの最大文字数（既定 8000）
# inject_budget_chars = 6000    # GROOM/SELECT/PLAN プロンプトへのメモリ注入文字数予算（既定 6000）
